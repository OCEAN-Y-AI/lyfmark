<form class="form-preset form-preset--newsletter" method="post" action="$target-url">
	<div class="form-preset__field">
		<label class="form-preset__label">
			Name *
			<input class="form-preset__input" type="text" name="name" placeholder="Name" autocomplete="name" required />
		</label>
	</div>
	<div class="form-preset__field">
		<label class="form-preset__label">
			E-mail *
			<input class="form-preset__input" type="email" name="email" placeholder="E-mailadresse" autocomplete="email" required />
		</label>
	</div>
	<div class="form-preset__actions">
		<button type="submit" class="form-preset__submit ui-button ui-button--light ui-button--cta ui-button--pill">Newsletter bestellen</button>
	</div>
</form>
