name: Installer Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "installer/**"
      - ".vscode/tasks.json"
      - "tools/installer/**"
      - "tools/build-release.mjs"
      - "tools/package-core.mjs"
      - "tools/release.mjs"
      - "tools/lyfmark-vscode/install-local-extension.mjs"
      - "tools/repair.mjs"
      - "tools/test-installer.mjs"
      - "tools/test-installer-e2e.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/installer-tests.yml"
  push:
    branches:
      - main
    paths:
      - "installer/**"
      - ".vscode/tasks.json"
      - "tools/installer/**"
      - "tools/build-release.mjs"
      - "tools/package-core.mjs"
      - "tools/release.mjs"
      - "tools/lyfmark-vscode/install-local-extension.mjs"
      - "tools/repair.mjs"
      - "tools/test-installer.mjs"
      - "tools/test-installer-e2e.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/installer-tests.yml"

jobs:
  installer-smoke:
    name: installer-smoke-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Installer Tests
        run: npm run test:installer

  installer-e2e-auto:
    name: installer-e2e-auto-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Installer E2E Auto Test
        run: npm run test:installer:e2e:auto

  windows-install-script:
    name: windows-install-script
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run Windows Install Script
        shell: pwsh
        run: |
          $installRoot = Join-Path $env:RUNNER_TEMP "lyfmark-script-install"
          $testHome = Join-Path $env:RUNNER_TEMP "lyfmark-script-home"
          $corePackage = Join-Path $env:RUNNER_TEMP "lyfmark-core-1.0.zip"
          $coreManifest = Join-Path $env:RUNNER_TEMP "lyfmark-core-1.0.manifest.json"
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $testHome | Out-Null
          node ".\tools\package-core.mjs" --version 1.0 --output $env:RUNNER_TEMP
          if (-not (Test-Path $corePackage)) {
            throw "Core package was not created."
          }
          if (-not (Test-Path $coreManifest)) {
            throw "Core manifest was not created."
          }
          $manifest = Get-Content -LiteralPath $coreManifest -Raw | ConvertFrom-Json
          $packageHash = (Get-FileHash -LiteralPath $corePackage -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($manifest.sha256 -ne $packageHash) {
            throw "Core package hash does not match manifest."
          }
          $packageEntries = @(tar -tf $corePackage)
          foreach ($requiredEntry in @("package.json", "package-lock.json", "installer/windows/install.ps1", "tools/installer/wizard.mjs", "tools/package-core.mjs", "tools/release.mjs")) {
            if ($packageEntries -notcontains $requiredEntry) {
              throw "Core package is missing required entry: $requiredEntry"
            }
          }
          if ($packageEntries | Where-Object { $_ -eq ".git" -or $_.StartsWith(".git/") }) {
            throw "Core package must not contain .git data."
          }
          $env:HOME = $testHome
          $env:USERPROFILE = $testHome
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File ".\installer\windows\install.ps1" `
            -CorePackageUrl $corePackage `
            -InstallDirectory $installRoot `
            -ProjectName "CI Test Site" `
            -Yes `
            -GitName "Installer CI User" `
            -GitEmail "installer-ci@example.com" `
            -SshComment "installer-ci@example.com" `
            -SkipToolInstall `
            -SkipVSCode `
            -SkipOpenWorkspace `
            -NoPause

          $projectRoot = Join-Path $installRoot "CI Test Site"
          if (-not (Test-Path (Join-Path $projectRoot "package.json"))) {
            throw "Installed project package.json missing."
          }
          if (-not (Test-Path (Join-Path $projectRoot "node_modules"))) {
            throw "Installed project dependencies missing."
          }
          if (-not (Test-Path (Join-Path $projectRoot "src\pages"))) {
            throw "Installed project src/pages mirror missing."
          }
          $branchName = git -C $projectRoot branch --show-current
          if ($branchName -ne "main") {
            throw "Installed project Git branch is not main."
          }
          $commitHash = git -C $projectRoot rev-parse --verify HEAD
          if ([string]::IsNullOrWhiteSpace($commitHash)) {
            throw "Installed project initial commit missing."
          }
