name: Installer Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "installer/**"
      - "tools/installer/**"
      - "tools/repair.mjs"
      - "tools/test-installer.mjs"
      - "tools/test-installer-e2e.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/installer-tests.yml"
  push:
    branches:
      - main
    paths:
      - "installer/**"
      - "tools/installer/**"
      - "tools/repair.mjs"
      - "tools/test-installer.mjs"
      - "tools/test-installer-e2e.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/installer-tests.yml"

jobs:
  installer-smoke:
    name: installer-smoke-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Installer Tests
        run: npm run test:installer

  installer-e2e-auto:
    name: installer-e2e-auto-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Installer E2E Auto Test
        run: npm run test:installer:e2e:auto
