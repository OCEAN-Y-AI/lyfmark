name: HMR Link Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/config/content-block-hmr.ts"
      - "src/components/manual-menu/**"
      - "src/remark/utils/content-blocks.ts"
      - "src/remark/utils/form-presets.ts"
      - "tools/test-hmr-links.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/hmr-link-tests.yml"
  push:
    branches:
      - main
    paths:
      - "src/config/content-block-hmr.ts"
      - "src/components/manual-menu/**"
      - "src/remark/utils/content-blocks.ts"
      - "src/remark/utils/form-presets.ts"
      - "tools/test-hmr-links.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/hmr-link-tests.yml"

jobs:
  hmr-links:
    name: hmr-links-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run HMR Link Test
        run: npm run test:hmr-links
